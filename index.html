<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garaże do wynajęcia</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', Tahoma, sans-serif;
    display:flex;
    min-height:100vh;
    background:#0f172a;
    color:#e5e7eb;
}

/* HAMBURGER */
#menuToggle {
    display:none;
    position:fixed;
    top:15px;
    left:15px;
    z-index:999;
    background:#22c55e;
    border:none;
    padding:10px 12px;
    border-radius:8px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* NAV */
nav {
    width:260px;
    background: radial-gradient(circle at top left, #1f2937, #000);
    display:flex;
    flex-direction:column;
    padding:20px;
    transition:0.3s;
}

nav h2 {
    text-align:center;
    color:#9ca3af;
}

nav button {
    background:none;
    border:none;
    color:#e5e7eb;
    padding:12px;
    text-align:left;
    cursor:pointer;
    border-radius:10px;
}

nav button.active,
nav button:hover {
    background:#1f2937;
}

/* MAIN */
main {
    flex:1;
    padding:30px;
}

/* SEKCJE */
section {
    display:none;
    background:#020617;
    padding:25px;
    border-radius:15px;
}

section.active {
    display:block;
}

/* FORM */
input, textarea {
    width:100%;
    padding:12px;
    margin:6px 0;
    background:#020617;
    border:1px solid #374151;
    color:white;
    border-radius:10px;
}

/* BUTTON */
.submit-btn {
    background:#22c55e;
    border:none;
    padding:14px;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* GRID FIX */
.contract-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:15px;
}

/* MOBILE */
@media (max-width: 900px) {

    body {
        flex-direction:column;
    }

    #menuToggle {
        display:block;
    }

    nav {
        position:fixed;
        top:0;
        left:-100%;
        height:100%;
        width:240px;
        z-index:998;
    }

    nav.open {
        left:0;
    }

    main {
        padding:20px;
    }

    .contract-grid {
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<button id="menuToggle">☰</button>

<nav id="nav">
    <h2>MENU</h2>
    <button class="active" onclick="showSection('opis', this)">Opis</button>
    <button onclick="showSection('dostepnosc', this)">Dostępność</button>
    <button onclick="showSection('cennik', this)">Cennik</button>
    <button onclick="showSection('kontakt', this)">Kontakt</button>
    <button onclick="showSection('formularz', this)">Formularz</button>
    <button onclick="showSection('mapa', this)">Mapa</button>
    <button onclick="showSection('zdjecia', this)">Zdjęcia</button>
    <button id="umowaBtn" style="display:none;" onclick="showSection('umowa', this)">Umowa</button>
    <button id="adminBtn" style="display:none;" onclick="showSection('admin', this)">Admin</button>
</nav>

<main>

<h1>Garaże do wynajęcia</h1>

<section id="opis" class="active">
Nowoczesne garaże 15 m², monitoring 24/7.
</section>

<section id="dostepnosc">
<p>Wolne garaże: <strong id="counter"></strong> / 20</p>
</section>

<section id="cennik">
<ul>
<li>1 miesiąc – 300 zł</li>
<li>3 miesiące – 850 zł</li>
<li>12 miesięcy – 3000 zł</li>
</ul>
</section>

<section id="kontakt">
Damian Chamera<br>
509-291-095
</section>

<section id="formularz">
<form>
<input placeholder="Imię">
<textarea placeholder="Wiadomość"></textarea>
<button class="submit-btn">Wyślij</button>
</form>
</section>

<section id="mapa">
<iframe width="100%" height="250" src="https://maps.google.com/maps?q=Ostrowiec&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<section id="zdjecia">
<img id="slider" src="images/garaz1.jpg" style="width:100%; border-radius:10px;">
</section>

<section id="umowa">
<h2>Umowa (działa jak u Ciebie)</h2>
</section>

<section id="admin">
<input type="number" id="adminInput" min="0" max="20">
<button onclick="save()">Zapisz</button>
</section>

</main>

<script>
/* MENU */
const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("nav");

toggle.onclick = () => nav.classList.toggle("open");

/* SEKCJE */
function showSection(id, btn) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    nav.classList.remove("open");
}

/* DOSTĘPNOŚĆ + LOCAL STORAGE */
let free = localStorage.getItem("freeSpaces") || 3;
document.getElementById("counter").innerText = free;

function save() {
    let val = document.getElementById("adminInput").value;
    localStorage.setItem("freeSpaces", val);
    document.getElementById("counter").innerText = val;
}

/* SLIDER */
let imgs = ["images/garaz1.jpg","images/garaz2.jpg","images/garaz3.jpg"];
let i = 0;

setInterval(()=>{
    i = (i+1)%imgs.length;
    document.getElementById("slider").src = imgs[i];
},3000);

/* SEKRETY */
let code="";
document.addEventListener("keydown", e=>{
    code+=e.key;

    if(code.includes("admin")){
        document.getElementById("adminBtn").style.display="block";
    }

    if(code.includes("159147")){
        let p = prompt("Hasło do umowy:");
        if(p==="c1a5t3c2k0"){
            document.getElementById("umowaBtn").style.display="block";
        }
    }
});
</script>

</body>
</html>
