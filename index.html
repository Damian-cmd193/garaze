<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garaże do wynajęcia</title>
  <style>
    body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display:flex; height:100vh; background:#f4f4f9; color:#333; }

    nav { width:220px; background:#1e1e2f; color:#fff; display:flex; flex-direction:column; padding-top:20px; box-shadow: 3px 0 6px rgba(0,0,0,0.2); }
    nav button { background:none; border:none; color:#fff; padding:15px; text-align:left; cursor:pointer; font-size:16px; width:100%; transition: all 0.3s; border-left: 5px solid transparent; }
    nav button:hover { background:#33334d; border-left:5px solid #00bcd4; }
    nav button.active { background:#33334d; border-left:5px solid #00bcd4; }

    main { flex:1; padding:40px 30px; overflow:auto; background: linear-gradient(to bottom, #f4f4f9 0%, #e0e0f0 100%); }
    header { text-align:center; margin-bottom:30px; }
    h1 { margin:0; font-size:36px; color:#1e1e2f; }

    section { display:none; background:#fff; padding:25px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:30px; opacity:0; transform: translateY(20px); transition: all 0.5s ease; }
    section.active { display:block; opacity:1; transform: translateY(0); }

    form { display:flex; flex-direction:column; max-width:500px; }
    input, textarea { padding:12px; margin:8px 0; border-radius:8px; border:1px solid #ccc; font-size:16px; }
    button.submit-btn { padding:14px; background:#00bcd4; color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:12px; }
    button.submit-btn:hover { background:#0097a7; }

    #map { width:100%; height:350px; margin-top:20px; border-radius:15px; }

    .gallery { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
    .gallery img { width:300px; height:200px; object-fit:cover; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<nav>
  <button class="active" onclick="showSection('opis', this)">Opis</button>
  <button onclick="showSection('dostepnosc', this)">Dostępność</button>
  <button onclick="showSection('kontakt', this)">Kontakt</button>
  <button onclick="showSection('formularz', this)">Formularz</button>
  <button onclick="showSection('mapa', this)">Mapa</button>
  <button onclick="showSection('zdjecia', this)">Zdjęcia</button>
</nav>

<main>
  <header>
    <h1>Garaże do wynajęcia</h1>
  </header>

  <section id="opis" class="active">
    <p>Oferujemy garaż o wymiarach <strong>5 x 3 m</strong> w bezpiecznej, monitorowanej lokalizacji. Teren jest chroniony, brama automatyczna.</p>
  </section>

  <section id="dostepnosc">
    <p><strong>Dostępność:</strong> 3 garaże</p>
  </section>

  <section id="kontakt">
    <p>Damian Chamera<br>509-291-095<br>damian_chamera@o2.pl</p>
  </section>

  <section id="formularz">
    <form action="https://formspree.io/f/mpqyvnwl" method="POST">
      <input type="text" name="name" placeholder="Imię i nazwisko" required>
      <input type="email" name="email" placeholder="Twój email" required>
      <textarea name="message" placeholder="Wiadomość" required></textarea>
      <button type="submit" class="submit-btn">Wyślij</button>
    </form>
  </section>

  <section id="mapa">
    <div id="map"></div>
  </section>

  <section id="zdjecia">
    <div class="gallery">
      <img src="images/foto1.jpg" alt="">
    </div>
  </section>
</main>

<script>
function showSection(id, btn) {
  document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function initMap() {
  const loc = { lat: 50.939, lng: 21.385 };
  const map = new google.maps.Map(document.getElementById('map'), { zoom: 15, center: loc });
  new google.maps.Marker({ position: loc, map: map });
}
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>

</body>
</html>
